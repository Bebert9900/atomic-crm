name: Email IMAP Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: email-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync IMAP mailboxes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      IS_CONFIGURED: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SERVICE_ROLE_KEY != '' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run sync
        if: env.IS_CONFIGURED == 'true'
        run: npm run sync:emails

      - name: Email sync skipped
        if: env.IS_CONFIGURED != 'true'
        run: echo '::warning::Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret'
